<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhysMem: Scaling Test-Time Memory for Embodied Physical Reasoning</title>
    <meta name="description" content="PhysMem: Scaling Test-Time Memory for Embodied Physical Reasoning">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,300;6..144,400;6..144,500;6..144,600;6..144,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS DESIGN SYSTEM — Google DeepMind style
           ============================================ */
        :root {
            --blue: #4285F4;
            --blue-dark: #1a73e8;
            --blue-light: rgba(66, 133, 244, 0.08);
            --blue-medium: rgba(66, 133, 244, 0.15);
            --green: #34A853;
            --green-light: rgba(52, 168, 83, 0.08);
            --red: #EA4335;
            --red-light: rgba(234, 67, 53, 0.08);
            --yellow: #FBBC04;
            --yellow-light: rgba(251, 188, 4, 0.08);
            --black: #0D0D0D;
            --gray-50: #F8F9FA;
            --gray-100: #F1F3F4;
            --gray-200: #E8EAED;
            --gray-300: #DADCE0;
            --gray-400: #BDC1C6;
            --gray-500: #9AA0A6;
            --gray-600: #80868B;
            --gray-700: #5F6368;
            --gray-800: #3C4043;
            --gray-900: #202124;
            --font-display: 'Google Sans Flex', 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
            --font-body: 'Google Sans Flex', 'Google Sans', 'Helvetica Neue', Arial, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --section-gap: 80px;
            --content-width: 1100px;
            --text-width: 720px;
            --sidebar-width: 180px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            color: var(--gray-800);
            background: #fff;
            line-height: 1.6;
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ---- Layout ---- */
        .container {
            max-width: var(--content-width);
            margin: 0 auto;
            padding: 0 24px;
        }

        section { padding: var(--section-gap) 0; }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--blue);
            margin-bottom: 16px;
        }

        .section-title {
            font-family: var(--font-display);
            font-size: 36px;
            font-weight: 600;
            color: var(--gray-900);
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            line-height: 1.2;
        }

        .section-subtitle {
            font-size: 18px;
            color: var(--gray-600);
            line-height: 1.6;
            max-width: var(--text-width);
            font-weight: 300;
        }

        /* ---- Fade-in Animation ---- */
        .fade-in {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ---- Figures (paper images) ---- */
        .figure {
            margin: 40px auto;
            max-width: 900px;
        }
        .figure img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
        }
        .figure-caption {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: var(--gray-500);
            line-height: 1.5;
        }

        /* ============================================
           SIDEBAR NAVIGATION
           ============================================ */
        .sidebar-nav {
            position: fixed;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .sidebar-nav.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .sidebar-nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            border-left: 2px solid var(--gray-200);
        }

        .sidebar-nav li {
            position: relative;
        }

        .sidebar-nav a {
            display: block;
            padding: 6px 0 6px 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-500);
            text-decoration: none;
            transition: color 0.2s ease;
            line-height: 1.4;
        }

        .sidebar-nav a:hover {
            color: var(--gray-800);
        }

        .sidebar-nav li.is-active a {
            color: var(--blue);
            font-weight: 600;
        }

        .sidebar-nav li.is-active::before {
            content: '';
            position: absolute;
            left: -2px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--blue);
        }

        /* ============================================
           1. HERO
           ============================================ */
        .hero {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            overflow: hidden;
            padding: 60px 24px;
        }

        .hero-video-bg {
            position: absolute;
            inset: 0;
            z-index: 0;
            opacity: 0;
            animation: heroFadeIn 2s ease 1s forwards;
        }
        @keyframes heroFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .hero-video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.25;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 900px;
        }

        .hero-name {
            font-family: var(--font-display);
            font-size: 72px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.03em;
            line-height: 1;
            margin-bottom: 16px;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 300;
            color: rgba(255,255,255,0.75);
            letter-spacing: 0;
            line-height: 1.4;
            margin-bottom: 32px;
        }

        .hero-subtitle {
            font-size: 28px;
            color: rgba(255,255,255,0.75);
            font-weight: 300;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .hero-authors {
            font-size: 22px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 10px;
            font-weight: 400;
        }
        .hero-authors a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
        }
        .hero-authors a:hover { color: #fff; text-decoration: underline; }

        .hero-affiliations {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 28px;
        }

        /* Institution logos */
        .hero-logos {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            margin-bottom: 40px;
        }

        .hero-logos img {
            height: 96px;
            width: auto;
            filter: brightness(0) invert(1);
            opacity: 0.85;
            transition: opacity 0.2s ease;
        }

        .hero-logos img:hover {
            opacity: 1;
        }

        /* Link badges under title */
        .hero-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .hero-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            font-family: var(--font-body);
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.85);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(4px);
        }

        .hero-link:hover {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.12);
            color: #fff;
        }

        .hero-link svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.5;
        }

        .hero-link.primary {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        .hero-link.primary:hover {
            background: var(--blue-dark);
            border-color: var(--blue-dark);
            box-shadow: 0 4px 16px rgba(66, 133, 244, 0.35);
        }

        /* ============================================
           2. TL;DR
           ============================================ */
        .tldr-section {
            background: #fff;
            border-bottom: 1px solid var(--gray-100);
        }

        .tldr-card {
            max-width: var(--text-width);
            margin: 0 auto;
            background: linear-gradient(135deg, var(--blue-light), rgba(66, 133, 244, 0.03));
            border: 1px solid var(--blue-medium);
            border-radius: 12px;
            padding: 32px 36px;
        }

        .tldr-label {
            font-family: var(--font-mono);
            font-size: 13px;
            font-weight: 500;
            color: var(--blue);
            margin-bottom: 16px;
            letter-spacing: 0.05em;
        }

        .tldr-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tldr-list li {
            position: relative;
            padding-left: 20px;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.6;
            color: var(--gray-800);
            font-weight: 400;
        }

        .tldr-list li:last-child { margin-bottom: 0; }

        .tldr-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 10px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--blue);
        }

        /* ============================================
           3. ABSTRACT + KEY NUMBERS
           ============================================ */
        .abstract-section { background: #fff; }

        .abstract-text {
            font-size: 18px;
            line-height: 1.75;
            color: var(--gray-700);
            max-width: var(--text-width);
            margin: 0 auto 48px;
            font-weight: 300;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 720px;
            margin: 0 auto;
        }

        .stat-card {
            text-align: center;
            padding: 32px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            background: var(--gray-50);
        }

        .stat-number {
            font-family: var(--font-display);
            font-size: 48px;
            font-weight: 700;
            color: var(--blue);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: var(--gray-600);
            font-weight: 500;
        }

        /* ============================================
           4. PRESENTATION VIDEO
           ============================================ */
        .video-section { background: var(--gray-50); }

        .video-wrapper {
            max-width: 900px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08);
            background: var(--black);
        }

        .video-wrapper video {
            width: 100%;
            display: block;
        }

        .video-caption {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--gray-500);
        }

        /* ============================================
           5. METHOD OVERVIEW
           ============================================ */
        .method-section { background: #fff; }

        .method-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .method-card {
            padding: 28px 24px;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            background: #fff;
            text-align: center;
        }

        .method-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            background: var(--blue-light);
        }

        .method-card-icon svg {
            width: 24px;
            height: 24px;
            stroke: var(--blue);
            fill: none;
            stroke-width: 1.5;
        }

        .method-card h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 8px;
        }

        .method-card p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.5;
            font-weight: 300;
        }

        /* ============================================
           6. TASK DEMONSTRATIONS
           ============================================ */
        .demos-section { background: #fff; }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .demo-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            background: #fff;
        }

        .demo-card video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--gray-100);
        }

        .demo-card-body { padding: 20px; }

        .demo-card-body h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 6px;
        }

        .demo-card-body p {
            font-size: 14px;
            color: var(--gray-600);
            line-height: 1.5;
            font-weight: 300;
        }

        /* ============================================
           7. BEFORE / AFTER COMPARISONS
           ============================================ */
        .compare-section { background: #fff; }

        .compare-pair {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 40px;
        }
        .compare-pair:last-child { margin-bottom: 0; }

        .compare-item {
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--gray-200);
            position: relative;
        }

        .compare-item video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--gray-100);
        }

        .compare-label {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.03em;
            z-index: 2;
        }

        .compare-fail { border-color: var(--red); }
        .compare-fail .compare-label { background: var(--red); color: #fff; }

        .compare-success { border-color: var(--green); }
        .compare-success .compare-label { background: var(--green); color: #fff; }

        .compare-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 16px;
            text-align: center;
        }

        /* ============================================
           8. OOD GENERALIZATION
           ============================================ */
        .ood-section { background: var(--gray-50); }

        .ood-image {
            max-width: 800px;
            margin: 0 auto 32px;
            text-align: center;
        }

        .ood-image img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
        }

        .ood-group-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--gray-900);
            margin: 32px 0 16px;
            text-align: center;
        }

        .ood-group-title:first-child { margin-top: 0; }

        .ood-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .ood-card {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
            background: #fff;
        }

        .ood-card video {
            width: 100%;
            display: block;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: var(--gray-100);
        }

        .ood-card-label {
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-700);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ood-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ============================================
           9. BIBTEX + FOOTER
           ============================================ */
        .bibtex-section {
            background: #fff;
            border-top: 1px solid var(--gray-200);
        }

        .bibtex-block {
            position: relative;
            max-width: var(--text-width);
            margin: 0 auto;
            background: var(--gray-50);
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 24px;
            overflow-x: auto;
        }

        .bibtex-block pre {
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
            color: var(--gray-700);
            white-space: pre;
            margin: 0;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 14px;
            border: 1px solid var(--gray-300);
            border-radius: 6px;
            background: #fff;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            font-family: var(--font-body);
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .copy-btn.copied {
            background: var(--green-light);
            border-color: var(--green);
            color: var(--green);
        }

        footer.site-footer {
            padding: 32px 24px;
            text-align: center;
            font-size: 13px;
            color: var(--gray-500);
            background: #fff;
            border-top: 1px solid var(--gray-100);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 1440px) {
            .sidebar-nav { display: none; }
        }

        @media (max-width: 1024px) {
            .hero-name { font-size: 64px; }
            .hero-title { font-size: 24px; }
            .method-cards { grid-template-columns: repeat(2, 1fr); }
            .demo-grid { grid-template-columns: repeat(2, 1fr); }
            .section-title { font-size: 30px; }
        }

        @media (max-width: 768px) {
            :root { --section-gap: 56px; }
            .hero { min-height: auto; padding: 80px 24px; }
            .hero-name { font-size: 48px; }
            .hero-title { font-size: 20px; }
            .hero-subtitle { font-size: 20px; }
            .hero-video-bg { display: none; }
            .hero-logos img { height: 48px; }
            .hero-logos { gap: 20px; }
            .stats-row { grid-template-columns: 1fr; gap: 12px; }
            .stat-card { padding: 20px 16px; }
            .stat-number { font-size: 36px; }
            .method-cards { grid-template-columns: 1fr; }
            .demo-grid { grid-template-columns: 1fr; }
            .compare-pair { grid-template-columns: 1fr; }
            .ood-grid { grid-template-columns: 1fr 1fr; }
            .section-title { font-size: 26px; }
            .tldr-card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<!-- existing body content preserved -->
</body>
</html>
